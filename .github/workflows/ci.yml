name: CI Pipeline

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run tests
      run: pytest

  build:
    runs-on: ubuntu-latest
    needs: test  

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t flask-app .
